<mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
        [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) === false">
        <mat-toolbar>Menu</mat-toolbar>
        <mat-nav-list>
            <a mat-list-item routerLink="/dashboard">Dashboard</a>
            <a mat-list-item routerLink="/projects">DQ Projects</a>
            <a mat-list-item routerLink="/rules">DQ Rules</a>
            <a mat-list-item routerLink="/integration">Data Integration</a>
            <a mat-list-item routerLink="/alerts">Alerts</a>
            <a mat-list-item routerLink="/reports">Reports</a>
            <a mat-list-item routerLink="/kestra">Kestra Flows</a>
        </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
        <mat-toolbar color="primary">
            <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()"
                *ngIf="isHandset$ | async">
                <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
            </button>
            <div class="logo-container">
                <span class="logo-text">DQ</span>
                <span class="tool-text">Tool</span>
            </div>
        </mat-toolbar>
        <div class="content">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
